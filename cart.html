<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Корзина | The Loom</title>
<link rel="stylesheet" href="styles/cart.css">
</head>

<body>

<header>
    <nav>
        <a href="index.html">Компания</a>
        <a href="catalog.html">Каталог</a>
        <a href="contacts.html">Контакты</a>
        <a href="#" class="active">Корзина</a>
    </nav>
</header>

<div class="title">Корзина</div>

<div class="container">

    <div class="total-items">Всего: 6 товаров</div>

    <div class="grid">

        <div class="card">
            <img src="images/atlas.png">
            <h3>Атлас</h3>
            <div class="bottom">
                <div>570₽</div>
                <div class="controls">
                    <div class="btn">-</div>
                    <div>1</div>
                    <div class="btn">+</div>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="images/len.png">
            <h3>Лён</h3>
            <div class="bottom">
                <div>570₽</div>
                <div class="controls">
                    <div class="btn">-</div>
                    <div>2</div>
                    <div class="btn">+</div>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="images/jeans.png">
            <h3>Джинсовка</h3>
            <div class="bottom">
                <div>570₽</div>
                <div class="controls">
                    <div class="btn">-</div>
                    <div>1</div>
                    <div class="btn">+</div>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="images/lether.png">
            <h3>Кожа</h3>
            <div class="bottom">
                <div>570₽</div>
                <div class="controls">
                    <div class="btn">-</div>
                    <div>3</div>
                    <div class="btn">+</div>
                </div>
            </div>
        </div>

    </div>

    <div class="summary">
        <div class="sum">Итого: 3.420₽</div>
        <a href="#" class="checkout">Перейти к оформлению</a>
    </div>

</div>

<footer>
    <div>The Loom</div>
    <div>Все права защищены</div>
</footer>

</body>
</html>
